<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Grande Circo Digital — O Convite</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;500;600&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root{
  --vermelho:#E63946;
  --vermelho-escuro:#B01E2E;
  --amarelo:#FFD23F;
  --azul:#1FA2FF;
  --roxo:#7B2FF7;
  --verde:#2ECC71;
  --rosa:#FF6FB5;
  --branco:#FFFFFF;
  --preto:#050308;
  --glass-bg: rgba(20, 8, 30, 0.42);
  --glass-border: rgba(255, 255, 255, 0.35);
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body{
  width:100%; height:100%;
  overflow:hidden;
  background:var(--preto);
  font-family:'Poppins', sans-serif;
  color:var(--branco);
  touch-action:none;
}

button, a{ font-family:inherit; }

/* ============ SCENES ============ */
.scene{
  position:fixed; inset:0;
  width:100%; height:100%;
  opacity:0; visibility:hidden;
  transition:opacity 1s ease;
  overflow:hidden;
}
.scene.active{ opacity:1; visibility:visible; }

/* ---------- BOOT (black + tap prompt) ---------- */
#scene-boot{
  background:var(--preto);
  display:flex; align-items:center; justify-content:center;
  z-index:5;
}
.boot-inner{
  text-align:center;
  color:var(--amarelo);
  font-family:'Baloo 2', sans-serif;
  cursor:pointer;
}
.boot-inner .ring{
  width:clamp(56px, 8vw, 90px);
  height:clamp(56px, 8vw, 90px);
  margin:0 auto 1.2rem;
  border-radius:50%;
  border:3px solid var(--amarelo);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(22px,3vw,32px);
  animation:pulseRing 1.6s ease-in-out infinite;
}
@keyframes pulseRing{
  0%,100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(255,210,63,0.5); }
  50%{ transform:scale(1.08); box-shadow:0 0 0 14px rgba(255,210,63,0); }
}
.boot-inner p{
  font-size:clamp(14px, 2vw, 20px);
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-family:'Poppins', sans-serif;
  color:rgba(255,255,255,0.75);
}
.boot-hint{
  font-size:clamp(11px,1.4vw,14px) !important;
  margin-top:0.5rem;
  color:rgba(255,255,255,0.4) !important;
  text-transform:none !important;
  letter-spacing:normal !important;
}

/* ---------- CURTAIN SCENE ---------- */
#scene-curtain{ z-index:10; background:#1a0206; }
.curtain-half{
  position:absolute; top:0; bottom:0; width:52%;
  background:
    repeating-linear-gradient(90deg,
      var(--vermelho-escuro) 0px, var(--vermelho) 22px,
      var(--vermelho-escuro) 44px, #8f1522 66px);
  box-shadow: inset 0 0 120px rgba(0,0,0,0.65);
  transition: transform 2.6s cubic-bezier(.77,0,.18,1);
  z-index:2;
}
.curtain-half::before{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,215,120,0.18), transparent 30%, transparent 70%, rgba(0,0,0,0.5));
  pointer-events:none;
}
.curtain-half.left{ left:0; transform-origin:left; border-radius:0 0 40% 0/0 0 12% 0; }
.curtain-half.right{ right:0; transform-origin:right; border-radius:0 0 0 40%/0 0 0 12%; }
#scene-curtain.opening .curtain-half.left{ transform:translateX(-100%); }
#scene-curtain.opening .curtain-half.right{ transform:translateX(100%); }

.curtain-swag{
  position:absolute; top:0; left:0; right:0; height:14%;
  background:repeating-linear-gradient(90deg, var(--vermelho-escuro), var(--vermelho) 30px, var(--vermelho-escuro) 60px);
  border-bottom:6px solid var(--amarelo);
  z-index:3;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}
.curtain-tassel{
  position:absolute; bottom:-20px; width:16px; height:40px;
  background:var(--amarelo); border-radius:0 0 8px 8px;
  box-shadow:0 4px 8px rgba(0,0,0,0.4);
}

.curtain-title{
  position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
  z-index:4; text-align:center; width:90%;
  font-family:'Baloo 2', sans-serif;
  opacity:0; animation:fadeInTitle 1.5s ease 0.4s forwards;
}
@keyframes fadeInTitle{ to{ opacity:1; } }
.curtain-title h1{
  font-size:clamp(28px, 5.5vw, 64px);
  color:var(--amarelo);
  text-shadow:0 0 20px rgba(255,210,63,0.6), 3px 3px 0 var(--vermelho-escuro);
  letter-spacing:0.03em;
}
.curtain-title span{
  display:block; margin-top:0.6rem;
  font-family:'Fredoka', sans-serif;
  font-size:clamp(12px, 1.8vw, 18px);
  color:rgba(255,255,255,0.75);
  letter-spacing:0.25em;
  text-transform:uppercase;
}

/* ---------- STAGE SCENE ---------- */
#scene-stage{ z-index:1; background:#000; }
.stage-bg-wrap{
  position:absolute; inset:0;
  overflow:hidden;
}
.stage-bg{
  position:absolute; inset:-4%;
  width:108%; height:108%;
  background-size:cover;
  background-position:center 55%;
  transform:scale(1);
  transform-origin:52% 66%;
  transition:transform 6s cubic-bezier(.22,.61,.36,1);
  filter:saturate(1.15) contrast(1.05);
}
.stage-bg.zoomed{ transform:scale(1.42); }

.stage-vignette{
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse at 52% 60%, transparent 40%, rgba(10,0,20,0.55) 100%);
  z-index:2;
}

.light-sweep{
  position:absolute; inset:0; z-index:3; pointer-events:none; mix-blend-mode:screen; opacity:0.5;
}
.light-sweep .beam{
  position:absolute; top:-20%; width:16%; height:160%;
  background:linear-gradient(180deg, rgba(255,255,255,0.16), transparent 70%);
  transform-origin:top center;
  animation:sweep 7s ease-in-out infinite;
}
.light-sweep .beam.b1{ left:10%; animation-delay:0s; }
.light-sweep .beam.b2{ left:70%; animation-delay:2.3s; background:linear-gradient(180deg, rgba(255,210,63,0.14), transparent 70%); }
.light-sweep .beam.b3{ left:40%; animation-delay:4.6s; background:linear-gradient(180deg, rgba(123,47,247,0.14), transparent 70%); }
@keyframes sweep{
  0%,100%{ transform:rotate(-18deg); }
  50%{ transform:rotate(18deg); }
}

canvas#fx-canvas{ position:absolute; inset:0; z-index:4; pointer-events:none; width:100%; height:100%; }

/* ---------- MESSAGE BOX ---------- */
.message-wrap{
  position:absolute; inset:0; z-index:6;
  display:flex; align-items:center; justify-content:center;
  padding:3vh 4vw;
  opacity:0; visibility:hidden;
  transition:opacity 1.2s ease;
}
.message-wrap.show{ opacity:1; visibility:visible; }

.glass-box{
  max-width:min(760px, 78vw);
  max-height:88vh;
  overflow-y:auto;
  padding:clamp(18px,3vh,34px) clamp(20px,3.4vw,44px);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:26px;
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  box-shadow:0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
  text-align:center;
}
.glass-box::-webkit-scrollbar{ width:6px; }
.glass-box::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.3); border-radius:10px; }

.eyebrow{
  font-family:'Fredoka', sans-serif;
  font-size:clamp(11px,1.3vw,14px);
  letter-spacing:0.3em; text-transform:uppercase;
  color:var(--amarelo);
  margin-bottom:0.8rem;
}

#typewriter-text{
  font-family:'Poppins', sans-serif;
  font-weight:300;
  font-size:clamp(13px, 1.55vw, 18px);
  line-height:1.65;
  color:#fff;
  min-height:1.6em;
  white-space:pre-wrap;
}
#typewriter-text .cursor{
  display:inline-block; width:2px; background:var(--amarelo);
  animation:blinkCursor 0.8s steps(1) infinite;
  margin-left:2px;
}
@keyframes blinkCursor{ 50%{ opacity:0; } }

.invite-block{
  margin-top:clamp(14px,2.2vh,22px);
  opacity:0; transform:translateY(14px);
  transition:opacity 0.9s ease, transform 0.9s ease;
}
.invite-block.show{ opacity:1; transform:translateY(0); }

.invite-line1{
  font-family:'Baloo 2', sans-serif;
  font-size:clamp(16px,2.1vw,24px);
  color:var(--amarelo);
}
.invite-line2{
  font-family:'Fredoka', sans-serif;
  font-size:clamp(12px,1.4vw,15px);
  color:rgba(255,255,255,0.75);
  margin-bottom:clamp(14px,2vh,20px);
}

.enter-btn{
  position:relative;
  display:inline-flex; align-items:center; gap:0.6em;
  padding:0.85em 2.1em;
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:clamp(14px, 1.9vw, 20px);
  color:#3a0700;
  text-decoration:none;
  border:none; cursor:pointer;
  border-radius:50px;
  background:linear-gradient(135deg, var(--amarelo), #ffb347 60%, var(--vermelho));
  box-shadow:0 8px 0 var(--vermelho-escuro), 0 16px 34px rgba(230,57,70,0.45);
  transition:transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  overflow:hidden;
}
.enter-btn::after{
  content:"";
  position:absolute; top:0; left:-60%;
  width:40%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.65), transparent);
  transform:skewX(-20deg);
  transition:left 0.6s ease;
}
.enter-btn:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 12px 0 var(--vermelho-escuro), 0 22px 44px rgba(230,57,70,0.55);
  filter:brightness(1.05);
}
.enter-btn:hover::after{ left:120%; }
.enter-btn:active{
  transform:translateY(0) scale(0.98);
  box-shadow:0 4px 0 var(--vermelho-escuro), 0 8px 20px rgba(230,57,70,0.45);
}
.enter-btn:focus-visible{ outline:3px solid var(--branco); outline-offset:4px; }

/* ---------- FOOTER ---------- */
.footer-credit{
  position:absolute; right:clamp(14px,2vw,26px); bottom:clamp(10px,1.6vh,18px);
  z-index:8;
  font-family:'Fredoka', sans-serif;
  font-size:clamp(10px,1.1vw,13px);
  color:rgba(255,255,255,0.55);
  letter-spacing:0.05em;
  animation:footerGlow 3.2s ease-in-out infinite;
  opacity:0; transition:opacity 1.5s ease 1s;
}
.footer-credit.show{ opacity:1; }
@keyframes footerGlow{
  0%,100%{ text-shadow:0 0 4px rgba(255,210,63,0.15); }
  50%{ text-shadow:0 0 12px rgba(255,210,63,0.65); }
}

/* ---------- ORIENTATION LOCK ---------- */
#orientation-lock{
  display:none;
  position:fixed; inset:0; z-index:9999;
  background:radial-gradient(ellipse at center, #2a0a3d, #050308);
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:6vh 8vw;
}
#orientation-lock p{
  font-family:'Baloo 2', sans-serif;
  font-size:clamp(16px,4.4vw,22px);
  color:var(--amarelo);
  margin-top:2rem;
  max-width:340px;
}
.rotate-icon{
  width:72px; height:110px;
  border:5px solid var(--branco);
  border-radius:14px;
  position:relative;
  animation:rotatePhone 1.8s ease-in-out infinite;
}
.rotate-icon::after{
  content:""; position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  width:16px; height:3px; background:var(--branco); border-radius:2px;
}
@keyframes rotatePhone{
  0%{ transform:rotate(0deg); }
  40%{ transform:rotate(90deg); }
  70%{ transform:rotate(90deg); }
  100%{ transform:rotate(0deg); }
}

@media (orientation:portrait){
  #orientation-lock{ display:flex; }
  .scene{ display:none; }
}

@media (prefers-reduced-motion:reduce){
  .stage-bg{ transition:none; }
  .curtain-half{ transition:opacity 1.2s ease; }
  .light-sweep .beam, .boot-inner .ring, .footer-credit{ animation:none; }
}
</style>
</head>
<body>

<!-- Orientation lock overlay -->
<div id="orientation-lock" aria-hidden="true">
  <div class="rotate-icon"></div>
  <p>Gire seu dispositivo para viver o espetáculo.</p>
</div>

<!-- BOOT SCENE -->
<section class="scene active" id="scene-boot">
  <div class="boot-inner" id="boot-trigger" role="button" tabindex="0" aria-label="Toque para iniciar o espetáculo">
    <div class="ring">🎪</div>
    <p>Toque para iniciar</p>
    <p class="boot-hint">o Grande Circo Digital aguarda</p>
  </div>
</section>

<!-- CURTAIN SCENE -->
<section class="scene" id="scene-curtain">
  <div class="curtain-swag"></div>
  <div class="curtain-half left"></div>
  <div class="curtain-half right"></div>
  <div class="curtain-title">
    <h1>Grande Circo Digital</h1>
    <span>a cortina está prestes a se abrir</span>
  </div>
</section>

<!-- STAGE SCENE -->
<section class="scene" id="scene-stage">
  <div class="stage-bg-wrap">
    <div class="stage-bg" id="stage-bg"></div>
    <div class="stage-vignette"></div>
    <div class="light-sweep">
      <div class="beam b1"></div>
      <div class="beam b2"></div>
      <div class="beam b3"></div>
    </div>
    <canvas id="fx-canvas"></canvas>
  </div>

  <div class="message-wrap" id="message-wrap">
    <div class="glass-box">
      <div class="eyebrow">Anúncio do Mestre de Cerimônias</div>
      <p id="typewriter-text"></p>
      <div class="invite-block" id="invite-block">
        <div class="invite-line1">Apenas 6 jogadores.</div>
        <div class="invite-line2">Cada vaga importa.</div>
        <a class="enter-btn" id="enter-btn" href="https://chat.whatsapp.com/FCYooQuWv4bJDqXDJv1OYR" target="_blank" rel="noopener">
          🎪 ENTRAR NO ESPETÁCULO
        </a>
      </div>
    </div>
  </div>

  <div class="footer-credit" id="footer-credit">Criado por Ciel</div>
</section>

<script>
(function(){
  "use strict";

  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* =========================================================
     AUDIO ENGINE (Web Audio API — synthesized, no external files)
  ========================================================= */
  var AudioEngine = (function(){
    var ctx = null;
    var masterGain, musicGain, ambienceGain, sfxGain;
    var musicTimer = null;
    var ambienceSource = null;

    function init(){
      if(ctx) return;
      var AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      masterGain = ctx.createGain(); masterGain.gain.value = 1;
      musicGain = ctx.createGain(); musicGain.gain.value = 0.0;
      ambienceGain = ctx.createGain(); ambienceGain.gain.value = 0.0;
      sfxGain = ctx.createGain(); sfxGain.gain.value = 0.5;
      musicGain.connect(masterGain);
      ambienceGain.connect(masterGain);
      sfxGain.connect(masterGain);
      masterGain.connect(ctx.destination);
    }

    function makeNoiseBuffer(duration){
      var bufferSize = ctx.sampleRate * duration;
      var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      var data = buffer.getChannelData(0);
      for(var i=0;i<bufferSize;i++){ data[i] = Math.random()*2-1; }
      return buffer;
    }

    // Soft crowd murmur: filtered looping noise with slow amplitude wobble
    function startCrowdAmbience(){
      if(!ctx || ambienceSource) return;
      var buffer = makeNoiseBuffer(4);
      ambienceSource = ctx.createBufferSource();
      ambienceSource.buffer = buffer;
      ambienceSource.loop = true;

      var filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 500;
      filter.Q.value = 0.6;

      var wobble = ctx.createOscillator();
      wobble.frequency.value = 0.15;
      var wobbleGain = ctx.createGain();
      wobbleGain.gain.value = 0.03;
      wobble.connect(wobbleGain);
      wobbleGain.connect(ambienceGain.gain);
      wobble.start();

      ambienceSource.connect(filter);
      filter.connect(ambienceGain);
      ambienceSource.start();

      ambienceGain.gain.setValueAtTime(0, ctx.currentTime);
      ambienceGain.gain.linearRampToValueAtTime(0.09, ctx.currentTime + 1.2);
    }

    function stopCrowdAmbience(fadeTime){
      if(!ambienceGain) return;
      ambienceGain.gain.linearRampToValueAtTime(0, ctx.currentTime + (fadeTime||1));
    }

    // Curtain whoosh: noise burst through a sweeping lowpass filter
    function playCurtainWhoosh(){
      if(!ctx) return;
      var buffer = makeNoiseBuffer(2.2);
      var src = ctx.createBufferSource();
      src.buffer = buffer;
      var filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(200, ctx.currentTime);
      filter.frequency.linearRampToValueAtTime(4000, ctx.currentTime + 1.4);
      filter.frequency.linearRampToValueAtTime(300, ctx.currentTime + 2.2);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.3);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.2);
      src.connect(filter); filter.connect(g); g.connect(sfxGain);
      src.start(); src.stop(ctx.currentTime + 2.3);
    }

    // Circus calliope theme: looping playful melody using square/triangle oscillators
    function startCircusTheme(){
      if(!ctx) return;
      musicGain.gain.setValueAtTime(0, ctx.currentTime);
      musicGain.gain.linearRampToValueAtTime(0.16, ctx.currentTime + 1.5);

      var notes = [523.25,587.33,659.25,587.33,523.25,659.25,783.99,659.25,
                   587.33,659.25,698.46,659.25,587.33,523.25,493.88,523.25];
      var noteDur = 0.28;
      var step = 0;

      function playNote(freq, time, dur){
        var o1 = ctx.createOscillator();
        o1.type = 'square';
        o1.frequency.value = freq;
        var o2 = ctx.createOscillator();
        o2.type = 'triangle';
        o2.frequency.value = freq/2;
        var g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, time);
        g.gain.exponentialRampToValueAtTime(0.5, time + 0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, time + dur*0.95);
        o1.connect(g); o2.connect(g); g.connect(musicGain);
        o1.start(time); o2.start(time);
        o1.stop(time+dur); o2.stop(time+dur);
      }

      function scheduleLoop(){
        var startTime = ctx.currentTime + 0.05;
        for(var i=0;i<notes.length;i++){
          playNote(notes[i], startTime + i*noteDur, noteDur*0.9);
        }
        musicTimer = setTimeout(scheduleLoop, notes.length*noteDur*1000);
      }
      scheduleLoop();
    }

    function stopCircusTheme(){
      if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; }
      if(musicGain) musicGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
    }

    // Button hover chime
    function playHoverChime(){
      if(!ctx) return;
      var o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.12);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.22, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.28);
      o.connect(g); g.connect(sfxGain);
      o.start(); o.stop(ctx.currentTime + 0.3);
    }

    function playClickPop(){
      if(!ctx) return;
      var o = ctx.createOscillator();
      o.type = 'triangle';
      o.frequency.setValueAtTime(660, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.18);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
      o.connect(g); g.connect(sfxGain);
      o.start(); o.stop(ctx.currentTime + 0.2);
    }

    return {
      init: init,
      startCrowdAmbience: startCrowdAmbience,
      stopCrowdAmbience: stopCrowdAmbience,
      playCurtainWhoosh: playCurtainWhoosh,
      startCircusTheme: startCircusTheme,
      stopCircusTheme: stopCircusTheme,
      playHoverChime: playHoverChime,
      playClickPop: playClickPop
    };
  })();

  /* =========================================================
     PARTICLE FX (canvas) — stars, sparkles, confetti
  ========================================================= */
  var FX = (function(){
    var canvas = document.getElementById('fx-canvas');
    var ctx2d = canvas.getContext('2d');
    var particles = [];
    var running = false;
    var confettiColors = ['#E63946','#FFD23F','#1FA2FF','#7B2FF7','#2ECC71','#FF6FB5','#FFFFFF'];

    function resize(){
      canvas.width = canvas.clientWidth * devicePixelRatio;
      canvas.height = canvas.clientHeight * devicePixelRatio;
    }
    window.addEventListener('resize', resize);

    function spawnStar(){
      return {
        type:'star',
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height*0.7,
        r: (Math.random()*2+1)*devicePixelRatio,
        alpha: Math.random(),
        speed: Math.random()*0.02+0.01,
        dir: Math.random()>0.5?1:-1
      };
    }
    function spawnConfetti(){
      return {
        type:'confetti',
        x: Math.random()*canvas.width,
        y: -20,
        w: (Math.random()*6+4)*devicePixelRatio,
        h: (Math.random()*10+6)*devicePixelRatio,
        color: confettiColors[Math.floor(Math.random()*confettiColors.length)],
        vy: (Math.random()*0.6+0.4)*devicePixelRatio,
        vx: (Math.random()-0.5)*0.6*devicePixelRatio,
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()-0.5)*0.1
      };
    }
    function spawnSparkle(){
      return {
        type:'sparkle',
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        life: 0,
        maxLife: Math.random()*60+40,
        r: (Math.random()*2+1)*devicePixelRatio
      };
    }

    function init(){
      resize();
      particles = [];
      for(var i=0;i<50;i++) particles.push(spawnStar());
      for(var j=0;j<18;j++) particles.push(spawnSparkle());
    }

    var confettiBudget = 90;
    function tick(){
      if(!running) return;
      ctx2d.clearRect(0,0,canvas.width,canvas.height);

      if(confettiBudget > 0 && Math.random() < 0.6){
        particles.push(spawnConfetti());
        confettiBudget--;
      }

      for(var i=particles.length-1;i>=0;i--){
        var p = particles[i];
        if(p.type === 'star'){
          p.alpha += p.speed*p.dir;
          if(p.alpha<=0.1||p.alpha>=1) p.dir*=-1;
          ctx2d.beginPath();
          ctx2d.fillStyle = 'rgba(255,255,255,'+Math.max(0,Math.min(1,p.alpha))+')';
          ctx2d.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx2d.fill();
        } else if(p.type === 'sparkle'){
          p.life++;
          var t = p.life/p.maxLife;
          var a = Math.sin(t*Math.PI);
          ctx2d.save();
          ctx2d.globalAlpha = a;
          ctx2d.fillStyle = '#FFD23F';
          ctx2d.beginPath();
          ctx2d.moveTo(p.x, p.y-p.r*3);
          ctx2d.lineTo(p.x+p.r, p.y);
          ctx2d.lineTo(p.x, p.y+p.r*3);
          ctx2d.lineTo(p.x-p.r, p.y);
          ctx2d.closePath();
          ctx2d.fill();
          ctx2d.restore();
          if(p.life>=p.maxLife){
            particles[i] = spawnSparkle();
          }
        } else if(p.type === 'confetti'){
          p.x += p.vx; p.y += p.vy; p.rot += p.vr;
          ctx2d.save();
          ctx2d.translate(p.x,p.y);
          ctx2d.rotate(p.rot);
          ctx2d.fillStyle = p.color;
          ctx2d.fillRect(-p.w/2,-p.h/2,p.w,p.h);
          ctx2d.restore();
          if(p.y > canvas.height+30){
            particles.splice(i,1);
          }
        }
      }
      requestAnimationFrame(tick);
    }

    function start(){
      if(running) return;
      init();
      running = true;
      requestAnimationFrame(tick);
    }
    function stop(){ running = false; }

    return { start:start, stop:stop };
  })();

  var fullMessage = "Sejam muito bem-vindos ao Grande Circo Digital, minhas mais novas estrelas! Aqui, cada porta esconde um espetáculo, cada desafio rende aplausos e cada decisão pode transformar esta grande apresentação em uma comédia inesquecível ou em um desastre absolutamente hilário. Enquanto conseguirem continuar sorrindo, o show seguirá em frente, revelando atrações cada vez mais extraordinárias. Então levantem a cabeça, entrem no palco e façam o impossível, porque, neste circo, a cortina só se fecha quando vocês não conseguirem mais continuar.";

  function typewrite(el, text, speed, done){
    el.textContent = '';
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    cursor.textContent = '\u00A0';
    el.appendChild(cursor);
    var i = 0;
    var timer = setInterval(function(){
      cursor.insertAdjacentText('beforebegin', text.charAt(i));
      i++;
      if(i >= text.length){
        clearInterval(timer);
        cursor.remove();
        if(done) done();
      }
    }, speed);
  }

  function startExperience(){
    AudioEngine.init();
    AudioEngine.startCrowdAmbience();

    bootTrigger.style.pointerEvents = 'none';

    // Black screen with crowd ambience for ~2s
    setTimeout(function(){
      sceneBoot.classList.remove('active');
      sceneCurtain.classList.add('active');
      AudioEngine.startCircusTheme();

      // brief pause with curtains closed, then open
      setTimeout(function(){
        sceneCurtain.classList.add('opening');
        AudioEngine.playCurtainWhoosh();

        // reveal stage under the curtain as it opens
        setTimeout(function(){
          sceneStage.classList.add('active');
          if(!reducedMotion) FX.start();
        }, 900);

        // once curtain animation finishes, retire the curtain scene and start cinematic zoom
        setTimeout(function(){
          sceneCurtain.classList.remove('active');
          requestAnimationFrame(function(){
            stageBg.classList.add('zoomed');
          });
          footerCredit.classList.add('show');

          // after the zoom completes, reveal the message box
          setTimeout(function(){
            messageWrap.classList.add('show');
            typewrite(typewriterEl, fullMessage, 28, function(){
              setTimeout(function(){
                inviteBlock.classList.add('show');
              }, 300);
            });
          }, reducedMotion ? 300 : 6200);

        }, 2700);

      }, 900);

    }, 2000);
  }

  bootTrigger.addEventListener('click', startExperience);
  bootTrigger.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); startExperience(); }
  });

  enterBtn.addEventListener('mouseenter', function(){ AudioEngine.playHoverChime(); });
  enterBtn.addEventListener('click', function(){ AudioEngine.playClickPop(); });

})();
